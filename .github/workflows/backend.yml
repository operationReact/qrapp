name: Deploy Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build frontend and inject production API URL so the static bundle targets the correct backend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build frontend (production)
        working-directory: ./frontend
        env:
          VITE_API_URL: 'https://api.broandbro.in'
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist into backend static resources
        run: |
          # ensure backend static dir exists and is clean
          mkdir -p backend/src/main/resources/static
          rm -rf backend/src/main/resources/static/*
          cp -a frontend/dist/. backend/src/main/resources/static/

      # ✅ Build JAR using Gradle
      - name: Build JAR
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.6'
          arguments: ':backend:bootJar -x test'
        env:
          SPRING_PROFILES_ACTIVE: prod
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          RAZORPAY_KEY: ${{ secrets.RAZORPAY_KEY }}
          RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}

      # ✅ Rename JAR to deterministic name
      - name: Rename JAR to app.jar
        run: |
          cd backend/build/libs
          ls -l
          JAR_FILE=$(ls *.jar | head -n 1)
          mv "$JAR_FILE" app.jar
          ls -l

      # 🔥 Clean old JAR on VPS
      - name: Clean VPS app folder
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            rm -f /home/ubuntu/app/app.jar

      # ✅ Upload new JAR
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "backend/build/libs/app.jar"
          target: "/home/ubuntu/app/"
          strip_components: 3

      # 🚀 Restart backend safely
      - name: Restart Backend
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            echo "Files in app directory:"
            ls -l

            if [ ! -f app.jar ]; then
              echo "ERROR: app.jar not found!"
              exit 1
            fi

            pm2 stop backend || true
            pm2 delete backend || true

            pm2 start "java -jar /home/ubuntu/app/app.jar --spring.profiles.active=prod" --name backend
            pm2 save