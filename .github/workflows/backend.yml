name: Deploy Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Node FIXED (important)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ✅ Build frontend
      - name: Install and build frontend (production)
        working-directory: ./frontend
        env:
          VITE_API_URL: 'https://api.broandbro.in'
        run: |
          npm ci
          npm run build

      # ✅ Copy frontend into backend
      - name: Copy frontend dist into backend static resources
        run: |
          mkdir -p backend/src/main/resources/static
          rm -rf backend/src/main/resources/static/*
          cp -a frontend/dist/. backend/src/main/resources/static/

      # ✅ Build JAR
      - name: Build JAR
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.6'
          arguments: ':backend:bootJar -x test'
        env:
          SPRING_PROFILES_ACTIVE: prod
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          RAZORPAY_KEY: ${{ secrets.RAZORPAY_KEY }}
          RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}

      # ✅ Rename JAR
      - name: Rename JAR to app.jar
        run: |
          cd backend/build/libs
          JAR_FILE=$(ls *.jar | head -n 1)
          mv "$JAR_FILE" app.jar

      # ✅ Create checksum for jar (used to verify upload integrity)
      - name: Create SHA256 checksum for app.jar
        run: |
          cd backend/build/libs
          # create a checksum file compatible with `sha256sum -c`
          sha256sum app.jar > app.jar.sha256

      # 🧹 Clean VPS folder (safe reset)
      - name: Clean VPS app folder
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          # increase timeouts to tolerate transient network/connectivity issues
          timeout: 120s
          command_timeout: 10m
          sync: true
          script: |
            mkdir -p /home/ubuntu/app
            rm -f /home/ubuntu/app/app.jar

      # ✅ Upload JAR (FIXED)
      - name: Upload JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          # upload the jar into the app folder; use strip_components to ensure only the file is placed
          source: "backend/build/libs/app.jar"
          target: "/home/ubuntu/app/"
          overwrite: true
          rm: true
          strip_components: 3
          timeout: 120s

      - name: Upload checksum to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "backend/build/libs/app.jar.sha256"
          target: "/home/ubuntu/app/"
          overwrite: true
          rm: true
          strip_components: 3
          timeout: 120s

      # 🚀 Restart backend
      - name: Restart Backend
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          # increase timeouts to tolerate intermittent connectivity
          timeout: 120s
          command_timeout: 10m
          sync: true
          script: |
            cd /home/ubuntu/app
            echo "Files in app directory:"
            ls -lha

            # Sometimes the scp action mistakenly creates a directory named app.jar or app.jar.sha256
            # (observed when tar extraction created a directory). If that happened, attempt to recover
            # the actual file from inside the directory and replace the directory with the file.
            if [ -d app.jar ]; then
              echo "Detected app.jar is a directory — attempting recovery. Contents:"
              ls -lha app.jar || true
              candidate=$(find app.jar -type f -maxdepth 3 -print -quit || true)
              if [ -n "$candidate" ]; then
                echo "Found candidate file inside app.jar dir: $candidate"
                mv "$candidate" app.jar.tmp || true
                rm -rf app.jar
                mv app.jar.tmp app.jar || true
                echo "Recovered app.jar from directory"
              else
                echo "No file found inside app.jar directory to recover"
              fi
            fi

            if [ -d app.jar.sha256 ]; then
              echo "Detected app.jar.sha256 is a directory — attempting recovery. Contents:"
              ls -lha app.jar.sha256 || true
              candidate_sha=$(find app.jar.sha256 -type f -maxdepth 3 -print -quit || true)
              if [ -n "$candidate_sha" ]; then
                echo "Found candidate checksum inside app.jar.sha256 dir: $candidate_sha"
                mv "$candidate_sha" app.jar.sha256.tmp || true
                rm -rf app.jar.sha256
                mv app.jar.sha256.tmp app.jar.sha256 || true
                echo "Recovered app.jar.sha256 from directory"
              else
                echo "No file found inside app.jar.sha256 directory to recover"
              fi
            fi

            if [ ! -f app.jar ]; then
              echo "ERROR: app.jar not found!"
              exit 1
            fi

            # If checksum is present, verify integrity before starting
            if [ -f app.jar.sha256 ]; then
              echo "Verifying app.jar checksum:"
              cat app.jar.sha256
              sha256sum -c app.jar.sha256 || (
                echo "ERROR: checksum verification failed for app.jar";
                exit 1
              )
            else
              echo "WARNING: checksum file not found; skipping verification"
            fi

            pm2 stop backend || true
            pm2 delete backend || true

            pm2 start "SPRING_DATASOURCE_URL='${{ secrets.SPRING_DATASOURCE_URL }}' \
            SPRING_DATASOURCE_USERNAME='${{ secrets.SPRING_DATASOURCE_USERNAME }}' \
            SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}' \
            RAZORPAY_KEY='${{ secrets.RAZORPAY_KEY }}' \
            RAZORPAY_SECRET='${{ secrets.RAZORPAY_SECRET }}' \
            APP_CORS_ALLOWED_ORIGINS='${{ secrets.APP_CORS_ALLOWED_ORIGINS }}' \
            java -jar app.jar --spring.profiles.active=prod" --name backend

            pm2 save