<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Restaurant App</title>
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .boot-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .boot-card {
      width: min(100%, 420px);
      padding: 24px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .boot-spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border-radius: 9999px;
      border: 4px solid #fde68a;
      border-top-color: #f59e0b;
      animation: boot-spin 0.8s linear infinite;
    }

    .boot-title {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 700;
    }

    .boot-text {
      margin: 8px 0 0;
      font-size: 0.95rem;
      color: #475569;
    }

    @keyframes boot-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
<div id="root" aria-live="polite" aria-busy="true">
  <div class="boot-shell">
    <div class="boot-card">
      <div class="boot-spinner" aria-hidden="true"></div>
      <h1 class="boot-title">Loading Bro &amp; Bro</h1>
      <p class="boot-text">Preparing your menu and cart…</p>
    </div>
  </div>
</div>

<noscript>
  <div style="padding: 16px; text-align: center; font-family: Inter, system-ui, sans-serif;">
    This app needs JavaScript enabled to load.
  </div>
</noscript>

<!-- Vite entry -->
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
