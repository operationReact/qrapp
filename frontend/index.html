<!doctype html>
<html lang="en">
    <head>
        <title>Bro & Bro</title>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                margin: 0;
                font-family: "Instrument Sans", system-ui, sans-serif;
            }

            .boot-shell {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: #fafafa;
            }

            .boot-logo {
                width: 80px;
                height: 80px;
                margin-bottom: 24px;
                border-radius: 20px;
                overflow: hidden;
                animation: boot-pulse 1.5s ease-in-out infinite alternate-reverse;
            }

            .boot-logo img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .boot-spinner {
                position: relative;
                width: 32px;
                height: 32px;
                margin-bottom: 16px;
            }

            .boot-spinner::before,
            .boot-spinner::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 50%;
            }

            .boot-spinner::before {
                border: 2px solid #f5f5f5;
            }

            .boot-spinner::after {
                border: 2px solid transparent;
                border-top-color: #dc2626;
                animation: boot-spin 0.6s linear infinite;
            }

            .boot-title {
                margin: 0;
                font-size: 1.125rem;
                font-weight: 600;
                color: #18181b;
            }

            .boot-text {
                margin: 6px 0 0;
                font-size: 0.875rem;
                color: #71717a;
            }

            @keyframes boot-spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes boot-pulse {
                0% {
                    opacity: 0.6;
                    filter: blur(2px);
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.08);
                    filter: blur(0px);
                    opacity: 1;
                }
                100% {
                    opacity: 0.6;
                    filter: blur(2px);
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
        <div id="root" aria-live="polite" aria-busy="true">
            <div class="boot-shell">
                <div class="boot-logo">
                    <img src="/bro-logo.png" alt="Bro & Bro" />
                </div>
                <h1 class="boot-title">Good food, good mood</h1>
                <p class="boot-text">Something delicious is on the way…</p>
            </div>
        </div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
