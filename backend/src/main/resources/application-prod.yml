server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres}
    # Don't keep credentials in files. Require env vars on the server.
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Production CORS should be set via APP_CORS_ALLOWED_ORIGINS env var
app:
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.broandbro.qrapp: INFO

# Don't keep secrets in files - supply via environment variables or secret manager
razorpay:
  key: ${RAZORPAY_KEY}
  secret: ${RAZORPAY_SECRET}
  webhookSecret: ${RAZORPAY_WEBHOOK_SECRET}
