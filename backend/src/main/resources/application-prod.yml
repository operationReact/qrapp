server:
  port: 8080

spring:
  cache:
    type: caffeine
    cache-names: walletBalance,menu,menuRecommended
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres}
    # Don't keep credentials in files. Require env vars on the server.
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${SPRING_DATASOURCE_HIKARI_POOL_NAME:QrAppHikariPool}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:3}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:540000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:0}
      connection-init-sql: "SET statement_timeout = '8s'"
  flyway:
    enabled: true
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
    lock-retry-count: ${SPRING_FLYWAY_LOCK_RETRY_COUNT:180}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_batch_fetch_size: 50
        jdbc:
          fetch_size: 50
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 500

# Production CORS should be set via APP_CORS_ALLOWED_ORIGINS env var
app:
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.broandbro.qrapp: INFO

# Don't keep secrets in files - supply via environment variables or secret manager
razorpay:
  key: ${RAZORPAY_KEY}
  secret: ${RAZORPAY_SECRET}
  webhookSecret: ${RAZORPAY_WEBHOOK_SECRET}
